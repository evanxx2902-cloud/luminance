check process pg-vector with pidfile /data/pg-vector/postmaster.pid
  start program = "/bin/su - luminance -c '/usr/local/bin/pg_ctl -D /data/pg-vector -l /data/log/pg-vector.log start'"
  stop  program = "/bin/su - luminance -c '/usr/local/bin/pg_ctl -D /data/pg-vector stop'"
  if failed host localhost port 5433 type TCP then restart
  if 3 restarts within 5 cycles then timeout
